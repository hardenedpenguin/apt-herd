# apt-herd config — edit hosts below, then: ./apt-herd.rb -n

ssh:
  port: 22
  timeout: 10   # increase with -t 30 if hosts are on VPN/Tailscale

# Pick one or both ways to list hosts:

# Option A: list hosts here
hosts:
  # - 100.114.117.78
  # - home-server.local

# Option B: use ~/.ssh/config Host entries (wildcards like Host * are skipped)
# use_ssh_config: true

# Password auth (no SSH keys): copy apt-herd-credentials.json.example
# credentials: apt-herd-credentials.json
